    state: 40
    mass: 20
    context: 0
  particles: 64
  steps_per_interval: 20
  measures_per_batch: 256
  batching: target_balanced
  learning_rate: 0.001
  patience: 10
  seed: 0

evaluation:
  particles: 256
  measures_per_batch: 256

validation:
  strategy: auto
  fraction: 0.2

loss:
  mass: 1.0
  count: 0.1
  sinkhorn_epsilon: 0.1

output: ../../runs/gse314342/intrinsic_gold_seed0
