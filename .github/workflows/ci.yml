name: CI

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}
      - name: Static checks
        run: |
          uv run --locked --python ${{ matrix.python-version }} python -m compileall -q src examples analysis tests
          uv run --locked --python ${{ matrix.python-version }} ruff check src examples analysis tests
          uv run --locked --python ${{ matrix.python-version }} ruff format --check src examples analysis tests
          git diff --check
      - name: Test
        run: uv run --locked --python ${{ matrix.python-version }} python -m pytest -q
      - name: Coverage
        if: matrix.python-version == '3.11'
        run: uv run --locked --python 3.11 python -m pytest -q --cov=credo --cov-report=term --cov-fail-under=75
      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: |
          uv run --locked --python 3.13 python -m build
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
