run_id: synth_ddr
device: auto
output_dir: outputs/synth_ddr

data:
  min_cells_p4: 10
  min_cells_p60: 10
  pooled_state: true
  train_level: gene

latent:
  dim: 4
  whiten: false

model:
  embedding_dim: 4
  n_programs: 4
  mediator_dim: 4
  hidden_dim: 64
  depth: 2
  sigma_min: 0.001
  r_max: 2.0
  ecological_growth: false

simulation:
  n_particles: 64
  n_steps: 16
  store_history: false

training:
  optimizer: adamw
  lr_net: 0.0003
  lr_embed: 0.001
  weight_decay: 1.0e-6
  grad_clip: 1.0
  lambda_end: 1.0
  lambda_count: 0.0
  lambda_weak: 0.0
  lambda_aux: 0.0
  lambda_reg_embed: 1.0e-4
  lambda_reg_net: 1.0e-4
  lambda_reg_diffusion: 1.0e-4
  seed: 0
  epochs: 200
  early_stop_patience: 200
  log_every: 20
  checkpoint_every: 9999
  sinkhorn_epsilon: 0.1
  sinkhorn_tau: 1.0
  sinkhorn_max_iter: 100
  n_test_functions: 16
  test_function_bandwidth: 1.0
