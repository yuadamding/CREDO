data:
  support: ../../../inputs/GSE314342/canonical_gold/support.h5ad
  latent_key: X_credo
  measure_meta: ../../../inputs/GSE314342/canonical_gold/measure_meta.parquet
  masses: ../../../inputs/GSE314342/canonical_gold/masses.parquet
  counts: ../../../inputs/GSE314342/canonical_gold/counts.parquet
  dataset: ../../../inputs/GSE314342/canonical_gold/dataset.json

axis:
  kind: physical
  source: Rest
  labels: [Rest, Stim8hr, Stim48hr]
  values: [0.0, 8.0, 48.0]

model:
  embedding_dim: 8
  n_programs: 8
  hidden_dim: 128
  context: none
  growth_max: 9.2

