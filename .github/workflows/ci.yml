name: CI

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Static checks
        run: |
          python -m compileall -q src examples analysis tests
          ruff check src examples analysis tests
          ruff format --check src examples analysis tests
          git diff --check
      - name: Test
        run: python -m pytest -q
      - name: Coverage
        if: matrix.python-version == '3.11'
        run: python -m pytest -q --cov=credo --cov-report=term --cov-fail-under=75
      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: |
          python -m build
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
