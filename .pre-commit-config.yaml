repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: python -m ruff check src examples analysis tests
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check src examples analysis tests
        language: system
        pass_filenames: false
        types: [python]
      - id: tests
        name: compact test suite
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        types: [python]
      - id: git-diff-check
        name: git diff whitespace check
        entry: git diff --check
        language: system
        pass_filenames: false
